# .github/workflows/fetch_advisories.yml
name: Security Advisory Feed

on:
  schedule:
    - cron: '20 6 * * *'
  workflow_dispatch:

permissions:
  contents: write   # potřeba pro git commit

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch advisories
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: python scripts/fetch_advisories.py --hours 72

      - name: Generate HTML
        run: python scripts/generate_html.py

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/data.json
          git diff --cached --quiet || git commit -m "chore: update advisories $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
